<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Orbital-Credit Secure Login</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "primary-hover": "#0f6bd0",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-dark text-slate-100 font-display antialiased min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-slate-900/80 backdrop-blur-[2px] z-10"></div>
<img alt="Satellite view of farmland" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJLsQ8l0SjECbJTuvv80K4yFVqS4ZkMF5mmAC4tr7kGodg2_LSJQhEp5RVG7HzldyRiquYGm71DngzGf9UjOt6xEqXr3_VBX818bzg7VFGlKgdQ8GLwnb4pmT6sp6nd9eb4LulOU1X4PBRwogt91G2HfBU9LIvpnWFTU1UyNIyNwFevTpAlVf3tPF6lOuREs0L7qaMTStDmHLgl12fEeCC875SDjjK8MyzI4VbDzgqehkqNhfh1s-_EWfmTZgpKZxIuz1yCkmjEOU"/>
</div>
<div class="absolute top-6 right-6 z-20 flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20 backdrop-blur-md">
<span class="relative flex h-2.5 w-2.5">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
<span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-emerald-500"></span>
</span>
<span class="text-xs font-bold text-emerald-400 tracking-wide uppercase">System Status: Operational</span>
</div>
<main class="relative z-20 w-full max-w-md mx-4 p-8 bg-slate-900/90 border border-slate-700/50 rounded-2xl shadow-2xl backdrop-blur-xl">
<div class="flex flex-col items-center justify-center mb-8">
<div class="size-12 text-primary mb-3 bg-primary/10 p-2 rounded-xl">
<svg fill="currentColor" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4H17.3334V17.3334H30.6666V30.6666H44V44H4V4Z"></path>
</svg>
</div>
<h1 class="text-2xl font-bold text-white tracking-tight">Orbital-Credit</h1>
<p class="text-sm text-slate-400 mt-1">Banker Risk Assessment Portal</p>
</div>
<form action="#" class="space-y-6" method="POST">
<div class="space-y-4">
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="banker-id">Banker ID</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 group-focus-within:text-primary transition-colors text-[20px]">badge</span>
</div>
<input autocomplete="username" class="block w-full pl-10 pr-3 py-2.5 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all sm:text-sm" id="banker-id" name="banker-id" placeholder="Enter your ID (e.g. B-4921)" required="" type="text"/>
</div>
</div>
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-500 group-focus-within:text-primary transition-colors text-[20px]">lock</span>
</div>
<input autocomplete="current-password" class="block w-full pl-10 pr-3 py-2.5 bg-slate-800 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all sm:text-sm" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
</div>
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-600 bg-slate-800 text-primary focus:ring-primary focus:ring-offset-slate-900 transition duration-150 ease-in-out cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-300 cursor-pointer select-none" for="remember-me">Remember me</label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary-hover transition-colors" href="#">Forgot password?</a>
</div>
</div>
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-900 focus:ring-primary transition-all transform active:scale-[0.98]" type="button">
                Sign In to Dashboard
            </button>
</form>
<div class="mt-8 pt-6 border-t border-slate-800 text-center">
<p class="text-xs text-slate-500 flex items-center justify-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">encrypted</span>
                Secure 256-bit encrypted connection
            </p>
<p class="text-[10px] text-slate-600 mt-2">
                Unauthorized access is prohibited and monitored.
            </p>
</div>
</main>
<div class="absolute bottom-6 left-6 z-20 hidden md:block">
<p class="text-xs text-slate-500 font-medium">© 2024 Orbital-Credit. All rights reserved.</p>
</div>

</body></html>
